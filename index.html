<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; overflow: hidden; background: #000; }
        #canvas { display: block; width: 100%; height: 100vh; }
        #menu, #lobby { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 40px; border-radius: 10px; text-align: center; color: white; z-index: 100; }
        #lobby { display: none; }
        h1 { font-size: 48px; margin-bottom: 30px; }
        button { padding: 12px 30px; margin: 10px; font-size: 16px; cursor: pointer; background: #ff6b6b; border: none; color: white; border-radius: 5px; }
        button:hover { background: #ff5252; }
        input { padding: 10px; font-size: 16px; width: 280px; margin: 10px; border-radius: 5px; border: none; color: #000; }
        #roomCode { margin-top: 20px; font-size: 20px; color: #00ff00; }
        #playerCount { margin-top: 10px; }
        #startBtn { display: none; background: #51cf66; }
        #startBtn.show { display: inline-block; }
        #gameInfo { position: absolute; top: 20px; left: 20px; color: #00ff00; font-size: 16px; z-index: 101; pointer-events: none; }
        
        /* Стили для чата */
        #chatInputContainer { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 102; display: none; }
        #chatInput { width: 400px; padding: 12px; background: rgba(0,0,0,0.8); border: 2px solid #51cf66; color: white; font-size: 16px; border-radius: 5px; outline: none; }
    </style>
</head>
<body>

<div id="menu">
    <h1>⚡ GAME</h1>
    <button onclick="showLobby()">Играть</button>
</div>

<div id="lobby">
    <h1>Лобби</h1>
    <button onclick="createRoom()">Создать комнату</button>
    <div style="margin-top: 30px;">
        <input type="text" id="codeInput" placeholder="Код комнаты">
        <button onclick="joinRoom()">Войти</button>
    </div>
    <div id="roomCode"></div>
    <div id="playerCount"></div>
    <button id="startBtn" onclick="startGame()">Запуск</button>
    <button style="margin-top: 20px; background: #666;" onclick="backToMenu()">Назад</button>
</div>

<div id="gameInfo"></div>
<div id="chatInputContainer">
    <input type="text" id="chatInput" placeholder="Введите сообщение и нажмите Enter..." maxlength="50">
</div>

<canvas id="canvas"></canvas>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC9eNl5RdU8dIB1dM4uJ4-RbYbTdkl5L1w",
        projectId: "game-6fe2f",
        databaseURL: "https://game-6fe2f-default-rtdb.europe-west1.firebasedatabase.app",
        storageBucket: "game-6fe2f.appspot.com",
        messagingSenderId: "339159622379",
        appId: "1:339159622379:web:25da4d0cc5dd13c44b0f85"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    console.log('✅ Firebase инициализирован');

    let playerId = 'player_' + Math.random().toString(36).substr(2, 9);
    let roomId = null;
    let playerRole = null;
    let scene, camera, renderer, playerMesh, otherPlayerMesh;
    let keys = {};
    let gameStarted = false;
    let isChatOpen = false;
    let syncInterval = null;

    // WASD + русская раскладка
    document.addEventListener('keydown', (e) => {
        if (isChatOpen && e.code !== 'Enter') return; // Блокируем ходьбу при открытом чате

        const keyMap = {'KeyW': 'forward', 'KeyA': 'left', 'KeyS': 'backward', 'KeyD': 'right', 'KeyЦ': 'forward', 'KeyФ': 'left', 'KeyЫ': 'backward', 'KeyВ': 'right'};
        if (keyMap[e.code]) keys[keyMap[e.code]] = true;

        // Чат на ENTER
        if (e.code === 'Enter' && gameStarted) {
            handleChatToggle();
        }
    });

    document.addEventListener('keyup', (e) => {
        const keyMap = {'KeyW': 'forward', 'KeyA': 'left', 'KeyS': 'backward', 'KeyD': 'right', 'KeyЦ': 'forward', 'KeyФ': 'left', 'KeyЫ': 'backward', 'KeyВ': 'right'};
        if (keyMap[e.code]) keys[keyMap[e.code]] = false;
    });

    // Мышь
    document.addEventListener('click', () => {
        if (gameStarted && !isChatOpen) {
            document.getElementById('canvas').requestPointerLock?.();
        }
    });

    document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === document.getElementById('canvas') && camera && !isChatOpen) {
            camera.rotation.order = 'YXZ';
            camera.rotation.y -= e.movementX * 0.0025;
            camera.rotation.x -= e.movementY * 0.0025;
            if (camera.rotation.x > Math.PI / 2.2) camera.rotation.x = Math.PI / 2.2;
            if (camera.rotation.x < -Math.PI / 2.2) camera.rotation.x = -Math.PI / 2.2;
        }
    });

    function handleChatToggle() {
        const container = document.getElementById('chatInputContainer');
        const input = document.getElementById('chatInput');

        if (!isChatOpen) {
            // Открываем чат
            isChatOpen = true;
            keys = {}; // Сбрасываем движение
            document.exitPointerLock?.();
            container.style.display = 'block';
            input.focus();
        } else {
            // Закрываем чат и отправляем сообщение
            isChatOpen = false;
            const text = input.value.trim();
            if (text) {
                db.ref('rooms/' + roomId + '/chats/' + playerId).set({
                    text: text,
                    timestamp: Date.now()
                });
                show3DText(playerMesh, text);
            }
            input.value = '';
            container.style.display = 'none';
            document.getElementById('canvas').requestPointerLock?.();
        }
    }

    function generateCode() {
        return Math.random().toString(36).substring(2, 8).toUpperCase();
    }

    function showLobby() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('lobby').style.display = 'block';
    }

    function backToMenu() {
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('menu').style.display = 'block';
        if (roomId && playerRole === 'host') {
            db.ref('rooms/' + roomId).remove();
        }
        if (syncInterval) clearInterval(syncInterval);
    }

    function createRoom() {
        roomId = generateCode();
        playerRole = 'host';

        db.ref('rooms/' + roomId).set({
            host: playerId,
            players: {[playerId]: true},
            started: false
        }).then(() => {
            console.log('✅ Комната создана:', roomId);
            document.getElementById('codeInput').style.display = 'none';
            document.getElementById('roomCode').innerHTML = '<strong>Код: ' + roomId + '</strong>';
            listenToRoom();
        }).catch(err => console.error('Ошибка Firebase:', err));
    }

    function joinRoom() {
        const code = document.getElementById('codeInput').value.toUpperCase();
        if (!code) {
            alert('Введи код!');
            return;
        }

        db.ref('rooms/' + code).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const room = snapshot.val();
                const playerCount = Object.keys(room.players || {}).length;

                if (playerCount < 2) {
                    roomId = code;
                    playerRole = 'guest';
                    db.ref('rooms/' + code + '/players/' + playerId).set(true);
                    console.log('✅ Присоединился к комнате:', code);
                    document.getElementById('codeInput').style.display = 'none';
                    listenToRoom();
                } else {
                    alert('Комната полна!');
                }
            } else {
                alert('Комната не найдена!');
            }
        }).catch(err => console.error('Ошибка Firebase:', err));
    }

    function listenToRoom() {
        db.ref('rooms/' + roomId).on('value', (snapshot) => {
            if (snapshot.exists()) {
                const room = snapshot.val();
                const playerCount = Object.keys(room.players || {}).length;
                document.getElementById('playerCount').innerHTML = 'Игроков: ' + playerCount + '/2';

                if (playerCount === 2 && playerRole === 'host') {
                    document.getElementById('startBtn').classList.add('show');
                }

                if (room.started && !gameStarted) {
                    startGame();
                }
            }
        });
    }

    function startGame() {
        if (gameStarted) return;
        gameStarted = true;

        if (playerRole === 'host') {
            db.ref('rooms/' + roomId + '/started').set(true);
        }

        document.getElementById('menu').style.display = 'none';
        document.getElementById('lobby').style.display = 'none';
        
        initThreeJS();
        syncPlayers();
    }

    function initThreeJS() {
        const canvas = document.getElementById('canvas');
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xaaccff);
        scene.fog = new THREE.FogExp2(0xaaccff, 0.015); // Небольшой туман для атмосферы

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

        renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Свет
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // Пол
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(300, 300),
            new THREE.MeshStandardMaterial({ color: 0x55aa44, roughness: 0.9 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- ГЕНЕРАЦИЯ ОКРУЖЕНИЯ ---
        generateEnvironment();

        // Спавн игрока
        const startX = playerRole === 'host' ? -15 : 15;
        playerMesh = createPlayerMesh(startX, 0, 0, true);
        scene.add(playerMesh);

        // Позиционируем камеру изначально
        camera.position.set(startX, 1.9, 0.4); 
        camera.lookAt(playerRole === 'host' ? 15 : -15, 1.9, 0);

        document.getElementById('gameInfo').innerHTML = `
            <p>Режим: <strong>Solo</strong></p>
            <p style="margin-top: 5px;">WASD — Ходьба | Мышь — Обзор</p>
            <p style="margin-top: 5px; color: #ffeb3b;">Нажми ENTER чтобы писать в чат</p>
        `;

        animate();
    }

    function generateEnvironment() {
        // 1. Создаем деревья
        for (let i = 0; i < 20; i++) {
            const tree = new THREE.Group();
            
            // Ствол
            const trunk = new THREE.Mesh(
                new THREE.CylinderGeometry(0.3, 0.5, 4, 8),
                new THREE.MeshStandardMaterial({ color: 0x5a3d28, roughness: 0.9 })
            );
            trunk.position.y = 2;
            tree.add(trunk);

            // Листва
            const leaves = new THREE.Mesh(
                new THREE.SphereGeometry(1.8, 8, 8),
                new THREE.MeshStandardMaterial({ color: 0x2e6f40, roughness: 0.6 })
            );
            leaves.position.y = 4.5;
            tree.add(leaves);

            setRandomPosition(tree, 15, 120);
            scene.add(tree);
        }

        // 2. Создаем камни
        for (let i = 0; i < 30; i++) {
            const size = 0.5 + Math.random() * 1.2;
            const rock = new THREE.Mesh(
                new THREE.DodecahedronGeometry(size),
                new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 })
            );
            rock.position.y = size * 0.5;
            rock.scale.set(1, 0.7 + Math.random()*0.5, 1);
            
            setRandomPosition(rock, 10, 130);
            scene.add(rock);
        }

        // 3. Создаем траву (пучки)
        for (let i = 0; i < 150; i++) {
            const grassGroup = new THREE.Group();
            const bladeMat = new THREE.MeshBasicMaterial({ color: 0x3d8c33 });
            
            for(let j = 0; j < 3; j++) {
                const blade = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.6, 4), bladeMat);
                blade.position.set((Math.random()-0.5)*0.3, 0.3, (Math.random()-0.5)*0.3);
                blade.rotation.z = (Math.random() - 0.5) * 0.4;
                blade.rotation.x = (Math.random() - 0.5) * 0.4;
                grassGroup.add(blade);
            }

            setRandomPosition(grassGroup, 5, 140);
            scene.add(grassGroup);
        }
    }

    function setRandomPosition(object, minDist, maxDist) {
        // Распределяем объекты вокруг центра, чтобы они не спавнились прямо на игроках
        const angle = Math.random() * Math.PI * 2;
        const radius = minDist + Math.random() * (maxDist - minDist);
        object.position.x = Math.cos(angle) * radius;
        object.position.z = Math.sin(angle) * radius;
    }

    function createPlayerMesh(x, y, z, isLocal) {
        const group = new THREE.Group();

        // Тело капсулы (цилиндр + полусферы)
        const bodyGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.8, 16);
        const bodyMat = new THREE.MeshStandardMaterial({ color: isLocal ? 0xff4444 : 0x4444ff, roughness: 0.5 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 1.4;
        group.add(body);

        const capGeo = new THREE.SphereGeometry(0.6, 16, 16);
        const topCap = new THREE.Mesh(capGeo, bodyMat);
        topCap.position.y = 2.3;
        group.add(topCap);

        const bottomCap = new THREE.Mesh(capGeo, bodyMat);
        bottomCap.position.y = 0.5;
        group.add(bottomCap);

        // Глаза (смотрят вперед по оси +Z)
        const eyeGeo = new THREE.SphereGeometry(0.14, 8, 8);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.25, 2.0, 0.52);
        const leftPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), pupilMat);
        leftPupil.position.set(-0.25, 2.0, 0.63);
        group.add(leftEye);
        group.add(leftPupil);

        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(0.25, 2.0, 0.52);
        const rightPupil = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), pupilMat);
        rightPupil.position.set(0.25, 2.0, 0.63);
        group.add(rightEye);
        group.add(rightPupil);

        group.position.set(x, y, z);
        return group;
    }

    // Создание 3D-текста над головой через Canvas-текстуру
    function show3DText(mesh, text) {
        if (!mesh) return;
        
        // Удаляем старое облако текста, если оно есть
        const oldText = mesh.getObjectByName("chatBubble");
        if (oldText) mesh.remove(oldText);

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 512;
        canvas.height = 128;

        // Фон сообщения
        ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
        ctx.roundRect?.(10, 10, 492, 108, 15);
        ctx.fill();
        ctx.strokeStyle = '#51cf66';
        ctx.lineWidth = 4;
        ctx.stroke();

        // Текст сообщения
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 24px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, 256, 64);

        const texture = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
        const sprite = new THREE.Sprite(spriteMat);
        
        sprite.name = "chatBubble";
        sprite.scale.set(4, 1, 1);
        sprite.position.set(0, 3.4, 0); // Высота над таблеткой

        mesh.add(sprite);

        // Удалить текст через 5 секунд
        setTimeout(() => {
            if (mesh && sprite) mesh.remove(sprite);
        }, 5000);
    }

    function syncPlayers() {
        syncInterval = setInterval(() => {
            if (playerMesh && gameStarted && camera) {
                const speed = 0.16;
                const dir = new THREE.Vector3();

                if (keys.forward) dir.z -= 1;
                if (keys.backward) dir.z += 1;
                if (keys.left) dir.x -= 1;
                if (keys.right) dir.x += 1;

                if (dir.lengthSq() > 0) {
                    dir.normalize().multiplyScalar(speed);
                    dir.applyAxisAngle(new THREE.Vector3(0, 1, 0), camera.rotation.y);
                    playerMesh.position.add(dir);
                }
                
                // Вращаем тело персонажа за камерой по оси Y
                playerMesh.rotation.y = camera.rotation.y;

                // Камера от первого лица: ставим на уровень глаз и выдвигаем чуть-чуть вперед
                const offset = new THREE.Vector3(0, 1.9, 0.15);
                offset.applyAxisAngle(new THREE.Vector3(0, 1, 0), camera.rotation.y);
                camera.position.copy(playerMesh.position).add(offset);

                db.ref('rooms/' + roomId + '/pos/' + playerId).set({
                    x: Math.round(playerMesh.position.x * 100) / 100,
                    z: Math.round(playerMesh.position.z * 100) / 100,
                    rotY: Math.round(playerMesh.rotation.y * 100) / 100
                });
            }
        }, 30);

        // Слушаем позиции других игроков
        db.ref('rooms/' + roomId + '/pos').on('value', (snap) => {
            if (snap.exists() && scene) {
                const pos = snap.val();
                Object.keys(pos).forEach(id => {
                    if (id !== playerId) {
                        if (!otherPlayerMesh) {
                            otherPlayerMesh = createPlayerMesh(pos[id].x, 0, pos[id].z, false);
                            scene.add(otherPlayerMesh);
                        } else {
                            otherPlayerMesh.position.x = pos[id].x;
                            otherPlayerMesh.position.z = pos[id].z;
                            if(pos[id].rotY !== undefined) {
                                otherPlayerMesh.rotation.y = pos[id].rotY;
                            }
                        }
                    }
                });
            }
        });

        // Слушаем новые сообщения чата от других игроков
        db.ref('rooms/' + roomId + '/chats').on('child_changed', (snap) => {
            const data = snap.val();
            if (snap.key !== playerId && otherPlayerMesh) {
                show3DText(otherPlayerMesh, data.text);
            }
        });
        db.ref('rooms/' + roomId + '/chats').on('child_added', (snap) => {
            const data = snap.val();
            if (snap.key !== playerId && otherPlayerMesh) {
                show3DText(otherPlayerMesh, data.text);
            }
        });
    }

    function animate() {
        if (!renderer || !scene || !camera) return;
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        if (camera && renderer) {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    });
</script>

</body>
</html>
