<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Колобки</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; background: #222; }
        #canvas-container { width: 100vw; height: 100vh; display: none; }
        
        /* Экран ожидания */
        #lobby {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 30px; border-radius: 10px; text-align: center;
            z-index: 10; min-width: 280px;
        }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; margin-top: 10px; }
        button:disabled { background: #555; cursor: not-allowed; }

        /* Чат */
        #chat-container {
            position: absolute; bottom: 20px; left: 20px; width: 300px;
            display: none; flex-direction: column; pointer-events: none; z-index: 5;
        }
        #chat-input {
            width: 100%; padding: 8px; background: rgba(0,0,0,0.6); border: 1px solid #555;
            color: white; border-radius: 4px; pointer-events: auto; outline: none; display: none;
        }
        /* Область над головами (баблы сообщений) */
        .chat-bubble {
            position: absolute; background: rgba(255,255,255,0.9); color: black;
            padding: 5px 10px; border-radius: 8px; font-size: 14px; font-weight: bold;
            transform: translate(-50%, -100%); pointer-events: none; white-space: nowrap;
            border: 1px solid #ccc; transition: opacity 0.3s; z-index: 2;
        }
    </style>
    <!-- Подключаем Three.js и Firebase SDK (v9 compat) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="lobby">
        <h2>Комната ожидания</h2>
        <p id="player-count">Игроков в сети: 0 / 3</p>
        <div id="players-list" style="margin-bottom: 20px;"></div>
        <button id="start-btn" disabled>Запуск (Только для Создателя)</button>
    </div>

    <div id="canvas-container"></div>
    
    <div id="chat-container">
        <input type="text" id="chat-input" placeholder="Нажмите Enter для отправки..." maxlength="50">
    </div>

    <!-- Логика скриптов -->
    <script>
        // ТВОЙ АКТУАЛЬНЫЙ КОНФИГ FIREBASE
        const firebaseConfig = {
            projectId: "game-6fe2f",
            databaseURL: "https://game-6fe2f-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        
        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>

    <!-- Подключение остальных модулей игры -->
    <script src="take.js"></script>
    <script src="world.js"></script>
    <script src="control.js"></script>
    <script src="camera.js"></script>
</body>
</html>
